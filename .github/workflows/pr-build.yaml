# PR プレビュー用イメージビルド。
# preview ラベル付き PR の head SHA でタグ付けし、ApplicationSet
# (targetRevision: {{head_sha}}) が参照するイメージを供給する。
name: pr-build

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  id-token: write
  pull-requests: write # プレビュー URL のコメント投稿に必要

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GAR_LOCATION: us-central1
  GAR_REPO: us-central1-docker.pkg.dev/k8s-action-preview-26/preview

jobs:
  build-push:
    # オーナー本人の PR は無条件、第三者（フォーク）の PR は preview ラベル必須。
    # ※ auto-preview-label が GITHUB_TOKEN で付けるラベルの labeled イベントは
    #   再帰防止のため他ワークフローをトリガーしないので、ラベルに依存せず
    #   author でも判定する（ApplicationSet はポーリングなのでラベルで動く）
    if: >-
      github.event.pull_request.author_association == 'OWNER' ||
      contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1045675327208/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@k8s-action-preview-26.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE="$GAR_REPO/${{ matrix.service }}:${{ github.event.pull_request.head.sha }}"
          docker build --build-arg SERVICE=${{ matrix.service }} -t "$IMAGE" apps/
          docker push "$IMAGE"

  # プレビュー URL を PR にコメントする（初回のみ。マーカーで重複防止）。
  # フォーク PR は GITHUB_TOKEN が read-only のためスキップされる。
  comment-preview-url:
    needs: build-push
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview URL (once)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- preview-url -->"
          if gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json comments -q '.comments[].body' | grep -qF "$MARKER"; then
            echo "comment already exists, skip"
            exit 0
          fi
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body "$MARKER
          ## 🚀 プレビュー環境

          | | URL |
          |---|---|
          | プレビュー | http://pr-${PR}.preview.104.154.128.86.nip.io/ |
          | baseline（比較用） | http://app.104.154.128.86.nip.io/ |

          - 環境の生成まで **最大5分**（Argo CD のポーリング間隔）+ イメージ pull 時間がかかります
          - push のたびに head SHA のイメージで自動更新されます
          - PR クローズで自動削除されます"
