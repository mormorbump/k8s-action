# プレビュー環境全体の共有 Gateway。
# app.<IP>.nip.io (baseline) と pr-<N>.<IP>.nip.io (PR プレビュー) を
# ワイルドカードでまとめて受ける。ルーティングは各 VirtualService が担当。
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: preview-gateway
  namespace: baseline
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "app.104.154.128.86.nip.io"
        - "*.104.154.128.86.nip.io" # pr-<N>.preview.… をカバー
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        # cert-manager が発行した TLS secret（Gateway Pod と同じ
        # istio-ingress namespace に置く必要がある）
        credentialName: preview-tls
      hosts:
        - "app.104.154.128.86.nip.io"
        - "*.104.154.128.86.nip.io"
