# ClipMind（外部アプリリポジトリ mormorbump/clipmind）の PR プレビュー用テンプレート。
# ApplicationSet (clipmind-pr-preview) が namespace / images / VS host を差し替えて展開する。
# マニフェストはプラットフォームリポジトリ（ここ）、イメージはアプリリポジトリの CI が供給（ADR-0004）。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: preview-clipmind-0 # ApplicationSet の kustomize.namespace で上書き
resources:
  - namespace.yaml
  - app.yaml
  - ui.yaml
  - stores.yaml
  - preview-istio.yaml
