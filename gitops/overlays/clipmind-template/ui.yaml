# ClipMind Web UI (Streamlit)。
# API 接続は 2 系統:
# - CLIPMIND_API_URL:        Streamlit サーバプロセス → API（クラスタ内 DNS）
# - CLIPMIND_PUBLIC_API_URL: ブラウザが <img src> 等で参照する URL（外部ホスト）。
#   ApplicationSet が PR ごとの外部 URL にパッチする
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  labels:
    app: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
      annotations:
        proxy.istio.io/config: |
          holdApplicationUntilProxyStarts: true
    spec:
      containers:
        - name: ui
          image: us-central1-docker.pkg.dev/k8s-action-preview-26/preview/clipmind-ui:latest
          ports:
            - containerPort: 8501
          env:
            # env[0] は ApplicationSet の JSON パッチ対象（順序を変えないこと）
            - name: CLIPMIND_PUBLIC_API_URL
              value: http://pr-0.clipmind.104.154.128.86.nip.io # patched
            - name: CLIPMIND_API_URL
              value: http://clipmind # 同 namespace の API Service
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 30m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  labels:
    app: ui
spec:
  type: ClusterIP
  selector:
    app: ui
  ports:
    - name: http
      port: 80
      targetPort: 8501
