# 外部アプリリポジトリ mormorbump/clipmind の PR プレビュー。
#
# ポイント（ADR-0004）: PullRequest Generator が監視するのはアプリリポジトリだが、
# マニフェスト（source）はこのプラットフォームリポジトリの main から読む。
# {{head_sha}} はイメージタグの特定のみに使う。
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clipmind-pr-preview
  namespace: argocd
spec:
  goTemplate: false
  generators:
    - pullRequest:
        github:
          owner: mormorbump
          repo: clipmind # ← アプリリポジトリの PR を監視
          labels:
            - preview
        requeueAfterSeconds: 300
  template:
    metadata:
      name: "clipmind-pr-{{number}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/mormorbump/k8s-action.git # ← マニフェストはプラットフォーム側
        targetRevision: main
        path: gitops/overlays/clipmind-template
        kustomize:
          namespace: "preview-clipmind-{{number}}"
          images:
            - "us-central1-docker.pkg.dev/k8s-action-preview-26/preview/clipmind:{{head_sha}}"
            - "us-central1-docker.pkg.dev/k8s-action-preview-26/preview/clipmind-ui:{{head_sha}}"
          patches:
            - target:
                kind: VirtualService
                name: preview-entry
              patch: |-
                - op: replace
                  path: /spec/hosts/0
                  value: pr-{{number}}.clipmind.104.154.128.86.nip.io
            # ブラウザ向け URL（<img src> 等）を PR の外部ホストに差し替える。
            # env[0] = CLIPMIND_PUBLIC_API_URL 前提（ui.yaml 側の env 順序に依存）
            - target:
                kind: Deployment
                name: ui
              patch: |-
                - op: replace
                  path: /spec/template/spec/containers/0/env/0/value
                  value: http://pr-{{number}}.clipmind.104.154.128.86.nip.io
      destination:
        server: https://kubernetes.default.svc
        namespace: "preview-clipmind-{{number}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          # namespace は overlay の namespace.yaml で管理リソースとして作る
          # （CreateNamespace の自動作成は prune されず殻が残るため使わない）
          - CreateNamespace=false
