# hello アプリを GitOps 管理にする Argo CD Application。
# main ブランチの gitops/base/hello を監視し、差分があれば自動 sync する。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello
  namespace: argocd
  finalizers:
    # Application 削除時に管理下リソースも削除する（カスケード削除）
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mormorbump/k8s-action.git
    targetRevision: main
    path: gitops/base/hello
  destination:
    server: https://kubernetes.default.svc
    namespace: hello
  syncPolicy:
    automated:
      prune: true    # Git から消えたリソースをクラスタからも消す
      selfHeal: true # クラスタ側の手動変更を Git の状態に巻き戻す
    syncOptions:
      - CreateNamespace=false # namespace.yaml をマニフェストとして管理しているため
