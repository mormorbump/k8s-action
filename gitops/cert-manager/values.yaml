# cert-manager Helm values（学習用に requests を最小化）
#
# インストール手順:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager -n cert-manager \
#     --create-namespace -f gitops/cert-manager/values.yaml
crds:
  enabled: true

resources:
  requests:
    cpu: 10m
    memory: 32Mi

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

cainjector:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
