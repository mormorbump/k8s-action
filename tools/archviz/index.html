<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>k8s-action archviz — GKE + Istio 3D Architecture</title>
  <style>
    :root {
      --panel-bg: rgba(13, 17, 28, 0.88);
      --panel-border: rgba(120, 160, 255, 0.25);
      --text: #dce6ff;
      --accent: #6ea8ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #070a12; }
    #scene { position: fixed; inset: 0; }
    .hud {
      position: fixed; color: var(--text);
      font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px;
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: 10px; padding: 12px 14px; backdrop-filter: blur(6px);
      pointer-events: none;
    }
    #title { top: 14px; left: 14px; pointer-events: auto; }
    #title h1 { margin: 0 0 4px; font-size: 15px; color: var(--accent); }
    #title .meta { opacity: 0.7; }
    #legend { bottom: 14px; left: 14px; line-height: 1.9; }
    .chip { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 7px; vertical-align: -1px; }
    #info { top: 14px; right: 14px; min-width: 230px; max-width: 320px; display: none; }
    #info h2 { margin: 0 0 6px; font-size: 13px; color: var(--accent); }
    #info table { border-collapse: collapse; width: 100%; }
    #info td { padding: 1px 4px 1px 0; vertical-align: top; }
    #info td:first-child { opacity: 0.6; white-space: nowrap; }
    #hint { bottom: 14px; right: 14px; opacity: 0.75; }
    .ns-label, .obj-label {
      color: #cfe0ff; font-family: ui-monospace, Menlo, monospace;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      pointer-events: none; white-space: nowrap;
    }
    .ns-label { font-size: 12px; font-weight: 600; }
    .obj-label { font-size: 10px; opacity: 0.85; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="scene"></div>

  <div id="title" class="hud">
    <h1>k8s-action archviz</h1>
    <div class="meta" id="meta">loading data.json…</div>
  </div>

  <div id="legend" class="hud">
    <div><span class="chip" style="background:#39d98a"></span>Pod Running (Ready)</div>
    <div><span class="chip" style="background:#ffc24b"></span>Pod Pending / NotReady</div>
    <div><span class="chip" style="background:#ff5d5d"></span>Pod Failed</div>
    <div><span class="chip" style="background:#4f8dff"></span>istio-proxy sidecar</div>
    <div><span class="chip" style="background:#9a6bff"></span>traffic (Gateway → Service)</div>
  </div>

  <div id="info" class="hud"></div>
  <div id="hint" class="hud">drag: 回転 / wheel: ズーム / hover: 詳細</div>

  <script type="module" src="./main.js"></script>
</body>
</html>
